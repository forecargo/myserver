services:
  ocr-api:
    build: ./ocr-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./ocr-api:/app

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http --url=forecargo.ngrok.app ocr-api:8000
    env_file:
      - .env
    ports:
      - "4040:4040"
    depends_on:
      - ocr-api

volumes:
  caddy-data:
