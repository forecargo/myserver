services:
  ocr-api:
    build: ./ocr-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./ocr-api:/app

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - ./fudebako:/srv/fudebako

  guideline-api:
    build: ./guidline-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./guidline-api:/app

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trouble}
      POSTGRES_USER: ${POSTGRES_USER:-trouble}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trouble}"]
      interval: 5s
      timeout: 5s
      retries: 10

  trouble-api:
    build: ./trouble-api
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      BASE_URL: https://${NGROK_DOMAIN}/trouble
    volumes:
      - ./trouble-api:/app
    depends_on:
      postgres:
        condition: service_healthy

  mermaid-api:
    build:
      context: ./mermaid-api
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      MERMAID_DATABASE_URL: sqlite+aiosqlite:///./data/app.db
      CLAUDE_MODEL: claude-sonnet-4-6
    volumes:
      - ./mermaid-api/data:/app/data

  gpt-image:
    build: ./gpt-image
    restart: unless-stopped
    env_file:
      - ./gpt-image/.env
    volumes:
      - ./gpt-image:/app

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http --url=${NGROK_DOMAIN} --pooling-enabled caddy:80
    env_file:
      - .env
    ports:
      - "4040:4040"
    depends_on:
      - caddy

volumes:
  caddy-data:
  postgres-data:
