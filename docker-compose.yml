services:
  ocr-api:
    build: ./ocr-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./ocr-api:/app

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data

  guideline-api:
    build: ./guidline-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./guidline-api:/app

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command: http --url=forecargo.ngrok.app caddy:80
    env_file:
      - .env
    ports:
      - "4040:4040"
    depends_on:
      - caddy

volumes:
  caddy-data:
