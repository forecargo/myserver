name: EGGScan

options:
  bundleIdPrefix: com.hoshinoji
  deploymentTarget:
    iOS: "16.0"
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

targets:
  EGGScan:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: EGGScan
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "スケジュール画面を撮影します"
        NSCalendarsUsageDescription: "スケジュールをカレンダーに登録します"
        NSCalendarsWriteOnlyAccessUsageDescription: "スケジュールをカレンダーに登録します"
    entitlements:
      path: EGGScan.entitlements

    settings:
      SWIFT_VERSION: "5.9"
      PRODUCT_BUNDLE_IDENTIFIER: com.hoshinoji.eggscan
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
